name: Deploy Gatherly to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "gatherly/**"
      - ".github/workflows/deploy-gatherly-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Gatherly site
        uses: actions/upload-pages-artifact@v3
        with:
          path: gatherly
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
