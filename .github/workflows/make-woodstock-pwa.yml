name: Make Woodstock Home installable

on:
  push:
    paths:
      - '.github/workflows/make-woodstock-pwa.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add PWA install support to Woodstock Home
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('public/woodstock/index.html')
          text = path.read_text(encoding='utf-8')

          head = "<link rel='manifest' href='/woodstock/manifest.webmanifest'><link rel='icon' type='image/png' sizes='192x192' href='/woodstock/icons/icon-192.png'><link rel='apple-touch-icon' href='/woodstock/icons/icon-192.png'><meta name='mobile-web-app-capable' content='yes'><meta name='apple-mobile-web-app-capable' content='yes'><meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>"
          if 'manifest.webmanifest' not in text:
              text = text.replace('<title>Woodstock Home</title>', '<title>Woodstock Home</title>' + head, 1)

          css = ".install-card{position:fixed;z-index:90;left:50%;bottom:20px;transform:translateX(-50%);width:min(620px,calc(100% - 24px));display:flex;align-items:center;gap:14px;padding:15px 16px;border:1px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(36,54,44,.97);color:#fff;box-shadow:0 18px 55px rgba(24,34,28,.3);backdrop-filter:blur(14px)}.install-card[hidden]{display:none}.install-copy{flex:1;min-width:0}.install-copy strong{display:block;font-size:15px}.install-copy span{display:block;margin-top:3px;font-size:12px;line-height:1.35;color:rgba(255,255,255,.74)}.install-now{border:0;border-radius:11px;padding:11px 14px;background:#fff;color:var(--forest);font-weight:850;white-space:nowrap;cursor:pointer}.install-x{width:34px;height:34px;border:0;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:21px;cursor:pointer}@media(max-width:650px){.install-card{bottom:78px;align-items:flex-start}.install-now{align-self:center}.install-copy span{font-size:11px}}"
          if '.install-card{' not in text:
              text = text.replace('</style>', css + '</style>', 1)

          banner = "<div class='install-card' id='install-card' hidden><div class='install-copy'><strong>Install Woodstock Home</strong><span>This adds the real app—not just a browser shortcut—and opens full screen.</span></div><button class='install-now' id='install-now' type='button'>Install app</button><button class='install-x' id='install-x' type='button' aria-label='Dismiss'>×</button></div>"
          if "id='install-card'" not in text:
              text = text.replace('<body>', '<body>' + banner, 1)

          js = r"""
          let woodstockInstallPrompt=null;
          const installCard=document.getElementById('install-card');
          const installNow=document.getElementById('install-now');
          const installX=document.getElementById('install-x');
          const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
          if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/woodstock/sw.js',{scope:'/woodstock/'}).catch(()=>{}));}
          if(!isStandalone&&store.get('woodstock-install-dismissed')!=='true'){installCard.hidden=false;}
          window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();woodstockInstallPrompt=e;if(!isStandalone)installCard.hidden=false;});
          installNow.addEventListener('click',async()=>{if(woodstockInstallPrompt){woodstockInstallPrompt.prompt();const choice=await woodstockInstallPrompt.userChoice;woodstockInstallPrompt=null;if(choice.outcome==='accepted')installCard.hidden=true;}else{alert('Chrome is preparing the install. Refresh this page once, then tap “Install app” again. You can also open Chrome’s menu and choose “Install app.”');}});
          installX.addEventListener('click',()=>{installCard.hidden=true;store.set('woodstock-install-dismissed','true');});
          window.addEventListener('appinstalled',()=>{installCard.hidden=true;woodstockInstallPrompt=null;});
          """
          if 'woodstockInstallPrompt' not in text:
              text = text.replace('</script></body>', js + '</script></body>', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit installable app update
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "Woodstock Home Builder"
          git config user.email "actions@users.noreply.github.com"
          git add public/woodstock/index.html
          git commit -m "Make Woodstock Home installable"
          git push
