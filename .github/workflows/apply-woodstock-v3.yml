name: Apply shared Woodstock reminder app

on:
  push:
    branches:
      - agent/woodstock-shared-reminders-v3
    paths:
      - .github/workflows/apply-woodstock-v3.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out app branch
        uses: actions/checkout@v4
        with:
          ref: agent/woodstock-shared-reminders-v3
          fetch-depth: 0

      - name: Extract Woodstock app source
        shell: bash
        run: |
          cat .bootstrap/woodstock-v3-*.b64 | tr -d '\n' | base64 --decode > /tmp/woodstock-v3.tar.xz
          xz -t /tmp/woodstock-v3.tar.xz
          tar -xJf /tmp/woodstock-v3.tar.xz
          rm -rf .bootstrap
          rm -f .github/workflows/apply-woodstock-v3.yml

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          node --check public/woodstock/app.js
          node --check public/woodstock/sw.js
          node --check server/api/woodstock.post.js
          node --check server/api/woodstock-health.get.js
          node --check server/workflows/woodstock-household.js

      - name: Commit generated app
        shell: bash
        run: |
          git config user.name "Woodstock Home Builder"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Build shared Woodstock reminders app"
          git push origin HEAD:agent/woodstock-shared-reminders-v3
